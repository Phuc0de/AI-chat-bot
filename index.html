<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Study Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #e2ddd7;
    --border2: #ccc7c0;
    --text: #1a1916;
    --text2: #6b6660;
    --text3: #a09b95;
    --accent: #2a5bd7;
    --accent-bg: #eef2fc;
    --accent-border: #c5d1f5;
    --danger-bg: #fdf1f1;
    --danger: #c0392b;
    --danger-border: #f5c6c6;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-msg: 18px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .chat-wrap {
    width: 100%;
    max-width: 700px;
    display: flex;
    flex-direction: column;
    height: 90vh;
    max-height: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 2px 24px rgba(0,0,0,0.06);
  }

  /* Header */
  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .header-info h1 { font-size: 14px; font-weight: 500; color: var(--text); }
  .header-info p { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .status-dot {
    display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: #27ae60;
    margin-right: 4px; vertical-align: middle;
  }
  .btn-clear {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 12px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text2);
    cursor: pointer; transition: all 0.15s;
  }
  .btn-clear:hover { background: var(--surface2); border-color: var(--border2); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .msg-row {
    display: flex;
    animation: fadeUp 0.22s ease-out;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.assistant { justify-content: flex-start; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    margin-right: 8px; margin-top: 2px;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.65;
    word-break: break-word;
  }
  .bubble.user {
    background: var(--accent-bg);
    border: 1px solid var(--accent-border);
    color: #1a3a8f;
    border-radius: var(--radius-msg) var(--radius-msg) 4px var(--radius-msg);
  }
  .bubble.assistant {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
  }

  /* Markdown in bubbles */
  .bubble p { margin: 0 0 6px; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble ul, .bubble ol { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble strong { font-weight: 500; }
  .bubble code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 4px;
  }
  .bubble pre {
    background: #f4f2ed;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    overflow-x: auto;
    margin: 8px 0;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
  }
  .bubble pre code { background: transparent; padding: 0; }
  .bubble h2, .bubble h3 { font-weight: 500; margin: 10px 0 4px; }
  .bubble h2 { font-size: 15px; }
  .bubble h3 { font-size: 14px; }

  /* Typing indicator */
  .typing-dots {
    display: flex; align-items: center; gap: 4px;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-msg) var(--radius-msg) var(--radius-msg) 4px;
    width: fit-content;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3);
    animation: bounce 1.1s infinite ease-in-out;
  }
  .dot:nth-child(2) { animation-delay: 0.18s; }
  .dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-5px); opacity: 1; }
  }

  /* Error */
  .error-msg {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 10px 14px;
    background: var(--danger-bg);
    border: 1px solid var(--danger-border);
    border-radius: var(--radius-sm);
    font-size: 13px; color: var(--danger);
    animation: fadeUp 0.2s ease-out;
  }

  /* Input */
  .input-area {
    padding: 12px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  #user-input {
    flex: 1;
    padding: 9px 13px;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--surface);
    resize: none;
    line-height: 1.5;
    max-height: 100px;
    overflow-y: auto;
    transition: border-color 0.15s;
  }
  #user-input:focus { outline: none; border-color: var(--accent); }
  #user-input::placeholder { color: var(--text3); }
  #user-input:disabled { opacity: 0.6; cursor: not-allowed; }

  #send-btn {
    width: 38px; height: 38px; flex-shrink: 0;
    border: 1px solid var(--accent-border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--accent);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }
  #send-btn:hover:not(:disabled) { background: var(--accent-bg); }
  #send-btn:active:not(:disabled) { transform: scale(0.95); }
  #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .input-hint {
    margin-top: 6px;
    font-size: 11px;
    color: var(--text3);
    text-align: right;
  }

  /* Suggestion chips */
  .suggestions {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px;
  }
  .chip {
    padding: 5px 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  svg.icon { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<div class="chat-wrap">
  <div class="chat-header">
    <div class="header-left">
      <div class="avatar">🤖</div>
      <div class="header-info">
        <h1>AI Study Assistant</h1>
        <p><span class="status-dot"></span>Powered by Claude · Sẵn sàng hỗ trợ</p>
      </div>
    </div>
    <button class="btn-clear" onclick="clearChat()" title="Xóa và bắt đầu lại">
      <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Cuộc mới
    </button>
  </div>

  <div class="messages" id="messages">
    <!-- Welcome -->
    <div class="msg-row assistant">
      <div class="msg-avatar">🤖</div>
      <div class="bubble assistant">
        <p>Xin chào! Mình là <strong>AI Study Assistant</strong> — trợ lý học tập của bạn 👋</p>
        <p>Hỏi mình về bất kỳ chủ đề nào trong khoá học nhé!</p>
      </div>
    </div>
    <div class="suggestions" id="suggestions">
      <button class="chip" onclick="sendChip(this)">📚 Giải thích khái niệm</button>
      <button class="chip" onclick="sendChip(this)">✏️ Tóm tắt bài học</button>
      <button class="chip" onclick="sendChip(this)">🔍 Ví dụ minh hoạ</button>
      <button class="chip" onclick="sendChip(this)">❓ Câu hỏi ôn tập</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Nhập câu hỏi của bạn..."
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled title="Gửi">
        <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <p class="input-hint">Enter ↵ gửi &nbsp;·&nbsp; Shift+Enter xuống dòng</p>
  </div>
</div>

<script>
const SYSTEM = `Bạn là AI Study Assistant — trợ lý học tập thông minh tích hợp trong Moodle.
Nhiệm vụ: giúp sinh viên hiểu bài, giải thích khái niệm, đặt câu hỏi ôn tập.
Phong cách: thân thiện, rõ ràng, dùng ví dụ thực tế khi có thể.
Trả lời bằng tiếng Việt trừ khi được hỏi bằng ngôn ngữ khác.
Dùng markdown khi hữu ích (code block, bold, danh sách).`;

let history = [];
let isLoading = false;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');

inputEl.addEventListener('input', () => {
  sendBtn.disabled = !inputEl.value.trim() || isLoading;
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
}

function sendChip(btn) {
  inputEl.value = btn.textContent.replace(/^[^\s]+\s/, '');
  autoResize(inputEl);
  sendBtn.disabled = false;
  document.getElementById('suggestions')?.remove();
  sendMessage();
}

function scrollBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, html, isHtml = false) {
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;

  if (role === 'assistant') {
    const av = document.createElement('div');
    av.className = 'msg-avatar';
    av.textContent = '🤖';
    row.appendChild(av);
  }

  const bubble = document.createElement('div');
  bubble.className = `bubble ${role}`;
  if (isHtml) {
    bubble.innerHTML = html;
  } else {
    bubble.textContent = html;
  }
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  scrollBottom();
  return bubble;
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.id = 'typing-row';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = '🤖';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';

  row.appendChild(av);
  row.appendChild(dots);
  messagesEl.appendChild(row);
  scrollBottom();
}

function hideTyping() {
  document.getElementById('typing-row')?.remove();
}

function showError(msg) {
  const el = document.createElement('div');
  el.className = 'error-msg';
  el.innerHTML = `<span>⚠️</span><span>Lỗi: ${escapeHtml(msg)}. Vui lòng thử lại.</span>`;
  messagesEl.appendChild(el);
  scrollBottom();
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function parseMarkdown(text) {
  let html = escapeHtml(text);
  // code blocks
  html = html.replace(/```(?:\w+\n)?([\s\S]*?)```/g, (_, c) =>
    `<pre><code>${c.trim()}</code></pre>`);
  // inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // italic
  html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // h3
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  // h2
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  // lists
  html = html.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>[\s\S]+?<\/li>)(?!\s*<li>)/g, '<ul>$1</ul>');
  // numbered
  html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // paragraphs
  html = html.split(/\n{2,}/).map(p =>
    p.startsWith('<') ? p : `<p>${p.replace(/\n/g,'<br>')}</p>`
  ).join('');
  return html;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  inputEl.disabled = true;

  document.getElementById('suggestions')?.remove();

  history.push({ role: 'user', content: text });
  addMessage('user', text);
  showTyping();

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: history
      })
    });

    const data = await res.json();
    hideTyping();

    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

    const reply = (data.content || []).map(b => b.text || '').join('');
    history.push({ role: 'assistant', content: reply });
    addMessage('assistant', parseMarkdown(reply), true);

  } catch (err) {
    hideTyping();
    history.pop();
    showError(err.message);
  } finally {
    isLoading = false;
    inputEl.disabled = false;
    sendBtn.disabled = !inputEl.value.trim();
    inputEl.focus();
  }
}

function clearChat() {
  history = [];
  messagesEl.innerHTML = '';
  addMessage('assistant', '<p>Cuộc trò chuyện mới bắt đầu! 👋 Mình có thể giúp gì cho bạn?</p>', true);
  inputEl.focus();
}

inputEl.focus();
</script>
</body>
</html>
